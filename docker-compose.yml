version: '3.8'

services:
  web:
    build: .
    command: web
    ports:
      - "5001:5001"
    env_file: .env
    volumes:
      - ./token.json:/app/token.json
      - ./skills:/app/skills
    restart: unless-stopped

  bot:
    build: .
    command: bot
    env_file: .env
    volumes:
      - ./token.json:/app/token.json
      - ./skills:/app/skills
    restart: unless-stopped

# Optional: SearXNG can be added here if you want to self-host search too
#  searxng:
#    image: searxng/searxng:latest
#    ports:
#      - "8080:8080"
#    ...
